<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Família Leite — Europa 2026 ✈️</title>
<style>
  body { margin: 0; font-family: 'Georgia', serif; background: #1a1410; }
  
  #tela-senha {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(160deg, #1a1410 0%, #2c2018 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px 20px;
    text-align: center;
  }
  .flag-row { font-size: 2em; letter-spacing: 6px; margin-bottom: 20px; }
  .titulo {
    font-size: clamp(1.8em, 5vw, 2.8em);
    color: #fff; margin-bottom: 6px;
  }
  .titulo em { color: #c4a55a; font-style: italic; }
  .subtitulo { color: rgba(255,255,255,0.4); font-size: 0.9em; margin-bottom: 40px; }
  .senha-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(196,165,90,0.3);
    border-radius: 20px; padding: 32px 28px;
    max-width: 380px; width: 100%;
  }
  .senha-label {
    color: #c4a55a; font-size: 0.8em;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .senha-input {
    width: 100%; padding: 16px 20px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(196,165,90,0.3);
    border-radius: 12px; color: #fff;
    font-size: 1.1em; text-align: center;
    letter-spacing: 4px; outline: none;
    box-sizing: border-box;
    transition: border 0.2s;
  }
  .senha-input:focus { border-color: #c4a55a; }
  .senha-btn {
    width: 100%; margin-top: 16px;
    padding: 16px; border: none;
    background: linear-gradient(135deg, #c4a55a, #9a7b3f);
    color: #1a1410; font-size: 1em; font-weight: 700;
    border-radius: 12px; cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .senha-btn:hover { opacity: 0.9; }
  .senha-erro {
    color: #e74c3c; font-size: 0.85em;
    margin-top: 12px; display: none;
  }
  .senha-dica {
    color: rgba(255,255,255,0.25); font-size: 0.75em;
    margin-top: 20px;
  }
  #conteudo { display: block; }
</style>
</head>
<body>

<div id="conteudo"></div>

<script>



function carregarGuia() {
  var conteudo = document.getElementById('conteudo');
  conteudo.innerHTML = `<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf6f0;
  --bg2: #f2ebe0;
  --card: #ffffff;
  --border: #e0d5c5;
  --gold: #9a7b3f;
  --gold2: #c4a55a;
  --gold-light: #f5ead0;
  --rose: #8b3a3a;
  --rose-light: #fdf0f0;
  --text: #2a2018;
  --muted: #7a6a55;
  --green: #2e6b42;
  --green-light: #eaf5ee;
  --orange: #c06020;
  --orange-light: #fff3ea;
  --white: #ffffff;
  --sidebar-w: 280px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.6;
}

/* ══════════ TOP BAR ══════════ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 58px;
  background: var(--text);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.topbar-title {
  font-family: 'Playfair Display', serif;
  color: var(--gold2);
  font-size: 1.05em;
  letter-spacing: 0.5px;
}
.topbar-flag { font-size: 1.2em; }
.hamburger {
  width: 40px; height: 40px;
  background: none; border: none;
  cursor: pointer;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 5px;
  padding: 6px;
  border-radius: 8px;
  transition: background 0.2s;
}
.hamburger:hover { background: rgba(255,255,255,0.1); }
.hamburger span {
  display: block; width: 24px; height: 2px;
  background: var(--gold2);
  border-radius: 2px;
  transition: all 0.3s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ══════════ SIDEBAR ══════════ */
.overlay {
  display: none;
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.45);
}
.overlay.open { display: block; }

.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 160;
  width: var(--sidebar-w);
  background: var(--text);
  transform: translateX(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding: 70px 0 40px;
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  padding: 0 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 12px;
}
.sidebar-logo {
  font-family: 'Playfair Display', serif;
  color: var(--gold2); font-size: 1.2em;
  margin-bottom: 4px;
}
.sidebar-sub { color: rgba(255,255,255,0.4); font-size: 0.8em; }

.menu-item-btn {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 14px 24px;
  background: none; border: none;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  font-family: 'Lato', sans-serif;
  font-size: 1em; font-weight: 400;
  text-align: left;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}
.menu-item-btn:hover {
  background: rgba(255,255,255,0.06);
  color: #fff;
}
.menu-item-btn.active {
  background: rgba(196,165,90,0.12);
  color: var(--gold2);
  border-left-color: var(--gold2);
  font-weight: 700;
}
.menu-item-btn .icon { font-size: 1.2em; width: 26px; text-align: center; }

.menu-divider {
  height: 1px; background: rgba(255,255,255,0.08);
  margin: 8px 24px;
}

/* ══════════ MAIN CONTENT ══════════ */
.main {
  margin-top: 58px;
  padding: 0;
  min-height: calc(100vh - 58px);
}

.section { display: none; }
.section.active { display: block; }

.section-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

/* ══════════ CAPA / HERO ══════════ */
.hero-capa {
  background: linear-gradient(160deg, #1a1410 0%, #2c2018 100%);
  min-height: calc(100vh - 58px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 24px;
}
.hero-capa .flag-row { font-size: 2.2em; margin-bottom: 20px; letter-spacing: 6px; }
.hero-capa .pre-title {
  font-size: 0.78em; letter-spacing: 4px; color: var(--gold2);
  text-transform: uppercase; margin-bottom: 16px;
}
.hero-capa h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4em, 7vw, 4em);
  color: #fff; line-height: 1.15; margin-bottom: 10px;
}
.hero-capa h1 em { color: var(--gold2); font-style: italic; }
.hero-capa .hero-dates {
  color: rgba(255,255,255,0.5); font-size: 0.9em;
  margin-bottom: 28px;
}
.hero-versicle {
  background: rgba(196,165,90,0.1);
  border: 1px solid rgba(196,165,90,0.25);
  border-radius: 14px; padding: 16px 24px;
  max-width: 480px; margin: 0 auto 36px;
  font-style: italic; color: rgba(255,255,255,0.7);
  font-size: 0.9em; line-height: 1.7;
}
.hero-versicle strong { color: var(--gold2); }
.voo-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 18px 24px;
  max-width: 480px; width: 100%; margin: 0 auto 16px;
  text-align: left;
}
.voo-card-title {
  font-size: 0.72em; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold2); margin-bottom: 12px; font-weight: 700;
}
.voo-item {
  display: flex; gap: 12px; align-items: flex-start;
  margin-bottom: 8px; font-size: 0.88em; color: rgba(255,255,255,0.8);
}
.voo-item .dot { color: var(--gold2); flex-shrink: 0; margin-top: 2px; }
.codigo-reserva {
  background: rgba(196,165,90,0.15); border: 1px solid rgba(196,165,90,0.3);
  border-radius: 10px; padding: 10px 18px;
  max-width: 480px; width: 100%; margin: 0 auto;
  text-align: center; color: var(--gold2); font-size: 0.88em;
}
.codigo-reserva strong { font-size: 1.2em; letter-spacing: 2px; }

/* ══════════ TÍTULOS DE SEÇÃO ══════════ */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.9em; color: var(--text);
  margin-bottom: 6px;
}
.section-title em { color: var(--gold); font-style: italic; }
.section-subtitle {
  color: var(--muted); font-size: 0.9em;
  margin-bottom: 28px; padding-bottom: 20px;
  border-bottom: 2px solid var(--border);
}

/* ══════════ FAMÍLIA ══════════ */
.familia-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.familia-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.familia-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(154,123,63,0.12);
}
.familia-card-header {
  padding: 20px 22px 16px;
  background: linear-gradient(135deg, var(--text), #3a2c1c);
  display: flex; align-items: center; gap: 14px;
}
.familia-emoji { font-size: 2em; }
.familia-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.25em; color: var(--gold2);
}
.familia-role { font-size: 0.78em; color: rgba(255,255,255,0.5); margin-top: 2px; }
.familia-body { padding: 18px 22px; font-size: 0.95em; color: var(--muted); line-height: 1.75; }

/* ══════════ ROTEIRO ══════════ */
.day-block { margin-bottom: 32px; }
.day-header-row {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.day-num {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--text);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  color: var(--gold2); flex-shrink: 0;
  font-size: 0.85em; line-height: 1.2;
}
.day-info-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3em; color: var(--text);
}
.day-info-sub { font-size: 0.82em; color: var(--muted); }
.day-tag {
  margin-left: auto; flex-shrink: 0;
  font-size: 0.72em; padding: 4px 12px;
  border-radius: 20px; font-weight: 700;
  letter-spacing: 0.5px;
}
.tag-viena { background: #e8f0f8; color: #2a5a8a; }
.tag-buda  { background: #fdecea; color: #8a2a2a; }
.tag-hall  { background: var(--gold-light); color: var(--gold); }
.tag-brat  { background: #eaf5ee; color: #2a6a3a; }
.tag-voo   { background: #1a1410; color: var(--gold2); }

.tl { position: relative; padding-left: 26px; }
.tl::before {
  content: ''; position: absolute;
  left: 8px; top: 8px; bottom: 8px;
  width: 2px; background: var(--border);
}
.tl-row { position: relative; margin-bottom: 14px; }
.tl-dot {
  position: absolute; left: -26px; top: 5px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--gold); border: 3px solid var(--bg);
  box-shadow: 0 0 0 2px var(--gold);
}
.tl-dot.special {
  background: var(--rose);
  box-shadow: 0 0 0 2px var(--rose);
}
.tl-time { font-size: 0.75em; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
.tl-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  font-size: 0.92em;
  transition: box-shadow 0.2s;
}
.tl-box:hover { box-shadow: 0 4px 16px rgba(154,123,63,0.1); }
.tl-box.special-box {
  background: var(--rose-light); border-color: #d4a0a0;
}
.tl-box .tl-title { font-weight: 700; color: var(--text); margin-bottom: 3px; }
.tl-box .tl-desc { color: var(--muted); font-size: 0.9em; line-height: 1.55; }
.tl-box .tl-tip {
  margin-top: 8px; font-size: 0.83em;
  background: var(--gold-light);
  border-left: 3px solid var(--gold2);
  padding: 6px 10px; border-radius: 0 8px 8px 0;
  color: var(--text); line-height: 1.5;
}

/* ══════════ INGRESSOS ══════════ */
.ingresso-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.ingresso-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.ingresso-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(154,123,63,0.1);
}
.ingresso-top {
  background: var(--text); padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 12px;
}
.ingresso-icon { font-size: 1.6em; flex-shrink: 0; }
.ingresso-name {
  font-family: 'Playfair Display', serif;
  color: var(--gold2); font-size: 1.05em;
}
.ingresso-date { color: rgba(255,255,255,0.45); font-size: 0.78em; margin-top: 2px; }
.ingresso-body { padding: 14px 20px; }
.ingresso-price {
  font-size: 0.82em; font-weight: 700;
  color: var(--gold); margin-bottom: 10px;
}
.ingresso-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--text); color: var(--gold2);
  font-size: 0.82em; font-weight: 700;
  padding: 8px 16px; border-radius: 8px;
  text-decoration: none;
  transition: background 0.2s;
}
.ingresso-link:hover { background: #3a2c1c; }
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.8em; padding: 5px 12px;
  border-radius: 20px; font-weight: 700; margin-bottom: 8px;
}
.badge-ok { background: var(--green-light); color: var(--green); }
.badge-pago { background: var(--gold-light); color: var(--gold); }
.badge-local { background: var(--orange-light); color: var(--orange); }

/* ══════════ RESTAURANTES ══════════ */
.city-label {
  display: flex; align-items: center; gap: 10px;
  margin: 32px 0 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.city-label:first-of-type { margin-top: 0; }
.city-label h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4em; color: var(--text);
}
.city-chip {
  font-size: 0.72em; padding: 3px 12px;
  border-radius: 20px; font-weight: 700;
  letter-spacing: 0.5px;
}
.rest-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; margin-bottom: 18px;
}
.rest-top {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.rest-icon { font-size: 1.6em; flex-shrink: 0; }
.rest-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.1em; color: var(--text); margin-bottom: 2px;
}
.rest-meta { font-size: 0.8em; color: var(--muted); }
.rest-date-badge {
  margin-left: auto; flex-shrink: 0;
  background: var(--gold-light); color: var(--gold);
  font-size: 0.72em; font-weight: 700;
  padding: 4px 10px; border-radius: 8px;
}
.rest-body { padding: 16px 20px; }
.rest-status {
  border-radius: 10px; padding: 10px 14px;
  font-size: 0.85em; line-height: 1.65; margin-bottom: 12px;
}
.rest-status.ok { background: var(--green-light); border: 1px solid #b0d8bc; }
.rest-status.pending { background: var(--orange-light); border: 1px solid #f0c090; }
.rest-status.free { background: var(--green-light); border: 1px solid #b0d8bc; }
.menu-sec { margin-bottom: 14px; }
.menu-sec-title {
  font-size: 0.72em; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); font-weight: 700; margin-bottom: 8px;
}
.menu-list { display: flex; flex-direction: column; gap: 6px; }
.menu-li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 0.9em; line-height: 1.5;
}
.menu-li .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold2); margin-top: 7px; flex-shrink: 0;
}
.menu-li .dot.g { background: var(--green); }
.veg { display: inline-block; background: var(--green-light); color: var(--green); font-size: 0.72em; padding: 1px 6px; border-radius: 4px; font-weight: 700; margin-left: 4px; }
.warn-tip {
  background: var(--orange-light); border: 1px solid #f0c090;
  border-radius: 10px; padding: 10px 14px;
  font-size: 0.85em; color: var(--orange); line-height: 1.55;
  margin-top: 10px;
}

/* ══════════ FERNANDA & JACI ══════════ */
.fj-day-header {
  background: linear-gradient(135deg, var(--text), #3a2c1c);
  border-radius: 16px; padding: 22px 24px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
}
.fj-day-circle {
  width: 54px; height: 54px; border-radius: 50%;
  background: rgba(196,165,90,0.2); border: 2px solid var(--gold2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  color: var(--gold2); flex-shrink: 0; font-size: 0.9em;
}
.fj-day-title { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.2em; }
.fj-day-sub { color: rgba(255,255,255,0.5); font-size: 0.83em; margin-top: 2px; }

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px; margin-top: 12px;
}
.shop-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px;
  transition: transform 0.2s;
}
.shop-card:hover { transform: translateY(-2px); }
.shop-card h4 { font-weight: 700; color: var(--text); font-size: 0.95em; margin-bottom: 4px; }
.shop-card .addr { font-size: 0.78em; color: var(--muted); margin-bottom: 6px; }
.shop-card p { font-size: 0.85em; color: var(--muted); line-height: 1.55; }
.shop-card a { display: inline-block; font-size: 0.78em; color: var(--gold); text-decoration: none; margin-top: 6px; }
.must-badge { background: var(--rose); color: #fff; font-size: 0.68em; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: 6px; }
.jaci-badge { background: var(--gold); color: #fff; font-size: 0.68em; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: 6px; }

/* ══════════ DICAS ══════════ */
.dica-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.dica-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px;
}
.dica-card h4 { color: var(--gold); font-size: 0.88em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.dica-card p { font-size: 0.88em; color: var(--muted); line-height: 1.65; }

/* ══════════ INFO BOX ══════════ */
.info-box {
  background: var(--gold-light); border: 1px solid #d4b87a;
  border-radius: 14px; padding: 16px 20px; margin-bottom: 24px;
  font-size: 0.9em; line-height: 1.7; color: var(--text);
}
.info-box strong { color: var(--gold); }
.green-box {
  background: var(--green-light); border: 1px solid #90c8a0;
  border-radius: 14px; padding: 16px 20px; margin-bottom: 24px;
  font-size: 0.9em; line-height: 1.7; color: var(--text);
}

/* ══════════ HOTÉIS ══════════ */
.hotel-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px 22px; margin-bottom: 16px;
}
.hotel-name { font-family: 'Playfair Display', serif; font-size: 1.15em; color: var(--text); margin-bottom: 4px; }
.hotel-meta { font-size: 0.82em; color: var(--muted); margin-bottom: 10px; }
.hotel-detail { font-size: 0.88em; color: var(--text); line-height: 1.7; }
.hotel-detail a { color: var(--gold); text-decoration: none; }

sL3I54/Y/Y7hTOTIEilUgkByBi3lsYubMRfyx+x+xYeZRp//2Q==" alt="Família Leite" style="width:100%;max-width:700px;border-radius:20px;margin:0 auto 32px;display:block;box-shadow:0 8px 30px rgba(0,0,0,0.12);">
    <div class="familia-grid">
      <div class="familia-card">
        <div class="familia-card-header">
          <div class="familia-emoji">📚</div>
          <div>
            <div class="familia-name">Fernando</div>
            <div class="familia-role">O Google da Família</div>
          </div>
        </div>
        <div class="familia-body">Fernando não fala. Ele conta histórias. Com datas. Com nomes. Com detalhes que ninguém mais lembraria. Uma memória gigantesca que transforma qualquer almoço em aula.<br><br>Os netos o chamam de Google — e não é exagero. Sua memória é viva, precisa e impressionante. Ele trabalha desde cedo, sempre dedicado, responsável e correto.<br><br>É um paizão. Amor puro. Orgulho das filhas e dos 5 netos. Espiritualizado, sensato, do bem.<br><br>Já foi à Índia. Ama igrejas. E um dia tomou café com Chico Xavier — história que será contada novamente em alguma praça europeia, com riqueza de detalhes. Sempre envolvido com causas do terceiro setor e voluntariado — e isso diz tudo.<br><br>Viajar com o Fernando é ter história em cada esquina. Igrejas, museus, arquitetura, curiosidades… ele olha e traduz o mundo.<br><br>Está ficando um pouco ranzinza? Talvez. Mas apenas porque ama demais e quer tudo sob controle.<br><br>Europa 2026 será palco de mais histórias que ele contará por décadas.</div>
      </div>
      <div class="familia-card">
        <div class="familia-card-header">
          <div class="familia-emoji">🕯️</div>
          <div>
            <div class="familia-name">Jaci</div>
            <div class="familia-role">Luz, Paz e Serenidade</div>
          </div>
        </div>
        <div class="familia-body">Jaci é doação, é doçura em forma de gente.<br><br>Se você elogia algo que ela está usando, ela te entrega. Sua linguagem do amor é presente, cuidado e proteção. O abraço dela é porto seguro.<br><br>Foi a primeira fonoaudióloga da cidade de Araras. Trabalhou a vida inteira. E quando o primeiro neto nasceu, escolheu ser avó em tempo integral. É avó que brinca, que corre, que é mais criança do que as crianças.<br><br>É luz. É paz. É serenidade. Ela reza, protege, abençoa. Defende as filhas e os netos — e tem MUITO orgulho do marido. É uma luz que preenche qualquer ambiente.<br><br>Mas existe um momento em que a serenidade dá lugar a uma personagem lendária: a <em>'Jacizinha Aeroporto'</em>. Nessa fase, ela acorda três horas antes, apressa todo mundo e vigia o relógio. Porque perder voo não é opção.<br><br>Faz 53 anos que caminha ao lado de Fernando. E defende o marido com a mesma intensidade que defende as filhas.<br><br>O colo dela é memória, é Lar. E a Europa inteira caberá dentro desse colo. 💙</div>
      </div>
      <div class="familia-card">
        <div class="familia-card-header">
          <div class="familia-emoji">🏆</div>
          <div>
            <div class="familia-name">Daniela</div>
            <div class="familia-role">A Transformadora</div>
          </div>
        </div>
        <div class="familia-body">Daniela é presença. Tudo que ela toca, transforma. Chega nas pessoas certas. Alcança o que deseja. Palestra. Lidera. Influencia.<br><br>É inteligente, influente, determinada e conectada. Faz amigos com facilidade, alcança as pessoas certas, abre portas, cria movimento. Às vezes confia demais em quem não deve — porque o coração dela é enorme.<br><br>É a tia moderna. A tia doida. A tia good vibes. Se você quer fazer algo errado, é com ela que você fala. 😄<br><br>Confia demais às vezes. Mas nunca deixa de acreditar nas pessoas.<br><br>Em 2026, ela sobe ao palco. E a família inteira sobe junto. Esta viagem é sobre a conquista dela, sim. Mas também é sobre o impacto que ela gera — e sobre como a família inteira vibra quando ela brilha. ✨</div>
      </div>
      <div class="familia-card">
        <div class="familia-card-header">
          <div class="familia-emoji">🌿</div>
          <div>
            <div class="familia-name">Paula</div>
            <div class="familia-role">A Alma da Floresta</div>
          </div>
        </div>
        <div class="familia-body">Paula é intensidade e fragilidade na mesma medida.<br><br>A mais carente? Talvez. A mais coração? Com certeza. É coração exposto.<br><br>Ela é espiritualizada, trabalha com geobiologia e ama círculos de pedras. Ela cura espaços. Ama fadas, gnomos, animais e seres da natureza. O sonho secreto dela é encontrar um portal e voltar para a era medieval.<br><br>Por ela, viveria em uma cabana, no meio da floresta, cercada de cães e seres dimensionais (tipo Avatar).<br><br>Muda a energia dos lugares. Ela muda a energia das pessoas. Sente o que poucos percebem.<br><br>É amor infinito. E choraria se o livro não tivesse uma página só dela. 😄<br><br>E além de tudo: é a melhor anfitriã que existe. Quando a Paula acolhe, você sente que pode respirar.<br><br>Importante: este guia não poderia existir sem ela. Porque a Paula vive as viagens com emoção — e emoção é o que vira memória.<br><br>Ai se a dedicatória estivesse menor que das irmãs! #MEDO 😄</div>
      </div>
      <div class="familia-card">
        <div class="familia-card-header">
          <div class="familia-emoji">📋</div>
          <div>
            <div class="familia-name">Fernanda</div>
            <div class="familia-role">A Guardiã da União</div>
          </div>
        </div>
        <div class="familia-body">A caçula. Mimada? Talvez. Abençoada? Com certeza. Sempre sentiu a proteção de Deus em sua vida.<br><br>A fé dela é ecumênica: aprendeu com os evangélicos a firmeza da fé, com os espíritas a ideia de reencarnação, com os católicos a beleza da missa. E transformou isso em uma espiritualidade viva.<br><br>Ela trouxe um amigo pastor para perto — e hoje, toda quarta, ela, as irmãs e a mãe assistem à live dele. Isso é Fernanda: conecta pessoas, constrói pontes, cria rituais.<br><br>Apazigua. Organiza. Cuida. Talvez um pouco controladora. Mas apenas por amor.<br><br>É quem transforma sonho em planejamento. E planejamento em realidade.<br><br>Ela vibra alto, compartilha alegria… e guarda as dores para dentro. O foco dela é amar. E o maior amor da vida dela é a família — especialmente os filhos.<br><br>Este roteiro é, no fundo, um ato de amor em forma de logística. 💙</div>
      </div>
    </div>
  </div>
</section>

<script>
function toggleMenu() {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('overlay');
  var hb = document.getElementById('hamburger');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
  hb.classList.toggle('open');
}

function closeMenu() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}

function goTo(id) {
  var sections = document.querySelectorAll('.section');
  for (var i = 0; i < sections.length; i++) {
    sections[i].classList.remove('active');
  }
  var btns = document.querySelectorAll('.menu-item-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.remove('active');
  }
  var target = document.getElementById('sec-' + id);
  if (target) {
    target.classList.add('active');
  }
  if (event && event.currentTarget) {
    event.currentTarget.classList.add('active');
  }
  closeMenu();
  window.scrollTo(0, 0);
}


  // Executar scripts do guia
  var scripts = conteudo.querySelectorAll('script');
  scripts.forEach(function(s) {
    var novo = document.createElement('script');
    novo.textContent = s.textContent;
    document.body.appendChild(novo);
  });
}


</script>
